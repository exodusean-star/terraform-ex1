services:
  # main 서비스 (Nginx)
  service-docker-main:
    image: exodusean/nginx:1.29.7-docker-main
    container_name: docker-main-nginx-container
    restart: always
    ports:
      - "8080:80"
    networks:
      - board-network

  # docker-install (Nginx)
  service-docker-install:
    image: exodusean/nginx:1.29.7-docker-install
    container_name: docker-install-nginx-container
    restart: always
    ports:
      - "8081:80"
    networks:
      - board-network

  # docker-command (Nginx)
  service-docker-command:
    image: exodusean/nginx:1.29.7-docker-command
    container_name: docker-command-nginx-container
    restart: always
    ports:
      - "8082:80"
    networks:
      - board-network

  # docker-build (Nginx)
  service-docker-build:
    image: exodusean/nginx:1.29.7-docker-build
    container_name: docker-build-nginx-container
    restart: always
    ports:
      - "8083:80"
    networks:
      - board-network

  # docker-compose (Nginx)
  service-docker-compose:
    image: exodusean/nginx:1.29.7-docker-compose
    container_name: docker-compose-nginx-container
    restart: always
    ports:
      - "8084:80"
    networks:
      - board-network

  # docker-swarm (Nginx)
  service-docker-swarm:
    image: exodusean/nginx:1.29.7-docker-swarm
    container_name: docker-swarm-nginx-container
    restart: always
    ports:
      - "8085:80"
    networks:
      - board-network

  service-kubernetes:
    image: exodusean/fastapi:kubernetes-1
    container_name: kubernetes-fastapi-container
    restart: always
    ports:
      - "8086:8000"
    networks:
      - board-network

  service-board-mysql:
    image: exodusean/mysql:board
    container_name: mysql-primary-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "ian1234!"
      MYSQL_DATABASE: "iandb"
      MYSQL_USER: "ian"
      MYSQL_PASSWORD: "ian1234!"
      TZ: "Asia/Seoul"
    networks:
      - board-network

  fastapi-service:
    image: exodusean/fastapi:board
    depends_on:
      - service-board-mysql
    container_name: board-fastapi-container
    restart: always
    environment:
      DB_HOST: "mysql-primary-container"
      DB_USER: "ian"
      DB_PASSWORD: "ian1234!"
      DB_NAME: "iandb"
    networks:
      - board-network

  service-board-nginx:
    image: exodusean/nginx:board
    depends_on:
      - service-board-fastapi
    container_name: board-nginx-container
    restart: always
    ports:
      - "8087:80"
    networks:
      - board-network

networks:
  board-network:
    driver: bridge
